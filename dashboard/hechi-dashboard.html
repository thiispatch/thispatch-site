<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HECHI 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /* ============================================================
     Hechi operator dashboard - PlayStation design tokens (DESIGN.md)
     Self-contained: no external fonts/scripts/images (CSP-safe).
     Mock data shaped like Hechi's real outputs (eventlog / annotations
     / graph_handoff / gnn_input) + config editors that emit real YAML.
     ============================================================ */
  :root{
    --ps-blue:#0070d1; --ps-blue-pressed:#0064b7; --ps-blue-active:#004d8d; --on-primary:#fff;
    --ink:#000; --ink-deep:#121314; --ink-elevated:#181818; --charcoal:#1f2024;
    --canvas-dark:#17181C;
    --canvas-light:#fff; --surface-soft:#f3f3f3; --surface-card:#f5f7fa; --surface-2:#eef0f3;
    --body-light:rgba(0,0,0,.62); --mute-light:#6b6b6b; --ash-light:#cccccc;
    --on-dark:#fff; --body-dark:rgba(255,255,255,.72); --on-dark-mute:#b9bec6; --mute-dark:rgba(229,229,229,.5);
    --hairline:#e6e8ec; --hairline-dark:rgba(255,255,255,.12);
    --warning:#c81b3a; --warning-bg:#fbecee; --ok:#1f8f4e; --gold:#f5a623;
    --r-sm:4px; --r-md:8px; --r-lg:14px; --r-full:9999px;
    --sans:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --code:"JetBrains Mono","Cascadia Mono","Cascadia Code","IBM Plex Mono","Roboto Mono",ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --mono:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
    --sb:212px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--surface-soft);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;letter-spacing:-0.02em;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--ps-blue);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:#cfd4da;border:3px solid transparent;background-clip:padding-box;border-radius:7px}
  .mono{font-family:var(--mono)}

  /* ---------- shell ---------- */
  .app{display:flex;min-height:100vh}
  .sidebar{width:var(--sb);flex-shrink:0;background:var(--canvas-dark);color:var(--on-dark);position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:30}
  .main{flex:1;margin-left:var(--sb);min-width:0;display:flex;flex-direction:column}

  /* brand */
  .brand{display:flex;align-items:center;gap:13px;height:74px;padding:0 18px;background:#fff;border-bottom:1px solid var(--hairline)}
  .brand-logo{display:inline-flex;flex-shrink:0}
  .brand-logo img{height:60px;width:auto;display:block}
  .brand .wm{font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
  .brand .sub{font-family:var(--mono);font-size:10px;color:var(--on-dark-mute);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}

  /* nav */
  .nav{padding:12px 12px;flex:1;overflow:auto}
  .nav-group{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute-dark);padding:14px 10px 7px}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:var(--on-dark-mute);
    padding:9px 11px;border-radius:var(--r-md);font-size:13.5px;font-weight:500;letter-spacing:.1px;transition:background .12s,color .12s}
  .nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.85}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.on{background:var(--ps-blue);color:#fff}
  .nav-item.on svg{opacity:1}
  .nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;background:var(--warning);color:#fff;border-radius:var(--r-full);padding:1px 8px}
  .nav-item.on .badge{background:rgba(255,255,255,.25)}

  /* sidebar footer */
  .sb-foot{border-top:1px solid var(--hairline-dark);padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .status{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--on-dark-mute)}
  .status .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(31,143,78,.5);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,143,78,.45)}70%{box-shadow:0 0 0 6px rgba(31,143,78,0)}100%{box-shadow:0 0 0 0 rgba(31,143,78,0)}}
  .langtoggle{display:inline-flex;border:1px solid var(--hairline-dark);border-radius:var(--r-full);overflow:hidden;align-self:flex-start}
  .langtoggle button{padding:5px 12px;font-size:11.5px;font-weight:700;letter-spacing:.3px;background:transparent;color:var(--on-dark-mute);border:none}
  .langtoggle button.on{background:var(--ps-blue);color:#fff}

  /* ---------- topbar ---------- */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.9);backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--hairline);padding:0 var(--sp,28px) 0 28px;height:74px;display:flex;align-items:center;gap:16px}
  .topbar h1{font-size:20px;font-weight:600;letter-spacing:-.01em}
  .topbar .crumb{font-family:var(--mono);font-size:11px;color:var(--mute-light)}
  .topbar .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .mon-badge{display:none;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ps-blue-active);background:rgba(0,112,209,.1);border:1px solid rgba(0,112,209,.3);border-radius:var(--r-full);padding:4px 11px}
  .mon-badge.show{display:inline-flex}
  .tb-metric{font-family:var(--mono);font-size:12px;color:var(--mute-light)}
  .tb-metric b{color:var(--ink);font-weight:700}

  /* ---------- content ---------- */
  .content{padding:28px;max-width:1280px}
  [data-view-panel][hidden]{display:none}
  .sec-title{font-size:15px;font-weight:700;letter-spacing:.01em;margin:28px 0 14px;display:flex;align-items:center;gap:10px}
  .sec-title:first-child{margin-top:0}
  .sec-title .hint{font-weight:400;font-size:12.5px;color:var(--mute-light)}

  /* generic card */
  .card{background:#fff;border:1px solid var(--hairline);border-radius:var(--r-md);padding:20px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 18px;border-radius:var(--r-full);font-size:13.5px;font-weight:700;letter-spacing:.3px;border:1px solid transparent;background:#fff;color:var(--ink);transition:background .14s,border-color .14s,color .14s}
  .btn-primary{background:var(--ps-blue);color:#fff}
  .btn-primary:hover{background:var(--ps-blue-pressed)}
  .btn-ghost{background:#fff;border-color:var(--ash-light);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-danger{background:#fff;border-color:var(--warning);color:var(--warning)}
  .btn-danger:hover{background:var(--warning);color:#fff}
  .btn-sm{height:32px;padding:0 13px;font-size:12px}

  /* ===== Overview ===== */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border:1px solid var(--hairline);border-radius:var(--r-md);overflow:hidden}
  .kpi{position:relative;text-align:left;background:none;border:none;border-left:1px solid var(--hairline);padding:17px 18px;display:flex;flex-direction:column;gap:7px;transition:background .12s}
  .kpi:first-child{border-left:none}
  .kpi.click{cursor:pointer}
  .kpi.click:hover{background:var(--surface-card)}
  .kpi .kl{font-size:15px;color:var(--mute-light);font-weight:600}
  .kpi .kv{font-size:27px;font-weight:300;letter-spacing:-.01em;line-height:1.15;color:var(--ink)}
  .kpi .ksub{font-family:var(--mono);font-size:11px;color:var(--mute-light);line-height:1.5}
  .kpi-go{position:absolute;top:14px;right:14px;opacity:0;transition:opacity .12s;color:var(--mute-light)}
  .kpi.click:hover .kpi-go{opacity:1}
  .kpi-go svg{width:14px;height:14px;display:block}
  .ov-2col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start}

  /* route distribution bar + legend */
  .dist-total{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
  .dist-total b{font-size:27px;font-weight:300;line-height:1}
  .dist-total span{font-family:var(--mono);font-size:11px;color:var(--mute-light)}
  .distbar{display:flex;height:10px;border-radius:var(--r-full);overflow:hidden;background:var(--surface-2);margin-bottom:14px}
  .distbar span{display:block;height:100%}
  .legend{display:flex;flex-direction:column;gap:10px}
  /* donut distribution (same idiom as the verdict .ring) */
  .donutwrap{display:flex;align-items:center;gap:22px;margin-bottom:6px}
  .donut{width:132px;height:132px;border-radius:50%;flex-shrink:0;position:relative}
  .donut::after{content:"";position:absolute;inset:21px;border-radius:50%;background:#fff}
  .donut-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
  .donut-c b{font-size:25px;font-weight:300;line-height:1}
  .donut-c span{font-family:var(--mono);font-size:10.5px;color:var(--mute-light)}
  .legend-row{display:flex;align-items:center;gap:10px;font-size:13px}
  .legend-row i{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .legend-row .ln{flex:1}
  .legend-row .lv{font-family:var(--mono);font-weight:700}
  .legend-row .lm{font-family:var(--mono);font-size:11px;color:var(--mute-light)}

  /* health rows */
  .hrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hairline)}
  .hrow:last-child{border-bottom:none}
  .hrow .hl{font-size:13px;color:var(--body-light);flex:1}
  .hrow .hv{font-family:var(--mono);font-size:13px;font-weight:700}
  .bar{height:6px;border-radius:var(--r-full);background:var(--surface-2);overflow:hidden;width:120px;flex-shrink:0}
  .bar i{display:block;height:100%;background:var(--ps-blue);border-radius:var(--r-full)}

  /* recent list */
  .recent{display:flex;flex-direction:column}
  .rec-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hairline);cursor:pointer}
  .rec-item:last-child{border-bottom:none}
  .rec-item:hover{background:var(--surface-card)}
  .rec-item .rp{font-family:var(--mono);font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rec-item .rt-time{font-family:var(--mono);font-size:11px;color:var(--mute-light);flex-shrink:0;margin-left:14px;padding-left:14px;border-left:1px solid var(--hairline);min-width:46px;text-align:right}

  /* badges (shared) */
  .rt{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:var(--r-sm);padding:3px 9px;display:inline-flex;align-items:center;white-space:nowrap}
  .rt.alert{background:var(--warning-bg);color:var(--warning)}
  .rt.gnn{background:rgba(0,112,209,.1);color:var(--ps-blue)}
  .rt.context{background:var(--surface-soft);color:var(--mute-light)}
  .sev{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:var(--r-sm);padding:2px 7px}
  .sev.crit{background:var(--ink);color:#fff} .sev.high{background:#fff;color:var(--ink);border:1px solid var(--ink)}
  .sev.med{background:#fff;color:var(--mute-light);border:1px solid var(--ash-light)} .sev.none{color:var(--mute-light)}
  .act{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:var(--r-sm);padding:2px 7px;letter-spacing:.03em}
  .act.DENY{border:1px solid var(--warning);color:var(--warning)} .act.KILL{background:var(--warning);color:#fff}
  .act.LOG{border:1px solid var(--ash-light);color:var(--mute-light)}

  /* ===== Threats (two-pane) ===== */
  .threats{display:grid;grid-template-columns:minmax(340px,0.95fr) 1.05fr;gap:16px;align-items:start}
  .tcol{background:#fff;border:1px solid var(--hairline);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
  .tbar{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--hairline);flex-wrap:wrap}
  .search{font-family:var(--mono);font-size:12.5px;padding:7px 11px;border:1px solid var(--ash-light);border-radius:var(--r-sm);outline:none;flex:1;min-width:120px}
  .search:focus{border-color:var(--ps-blue)}
  .chip{font-size:12px;padding:5px 11px;border:1px solid var(--ash-light);border-radius:var(--r-full);background:#fff;color:var(--mute-light)}
  .chip:hover{border-color:var(--mute-light)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .tlist{overflow:auto}
  .trow{display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--hairline);border-left:3px solid transparent;cursor:pointer}
  .trow:hover{background:var(--surface-card)}
  .trow.sel{background:#eef4fb;border-left-color:var(--ps-blue)}
  .trow.alert{border-left-color:var(--warning)} .trow.sel.alert{background:var(--warning-bg)}
  .trow .tp{font-family:var(--mono);font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .trow .td{font-size:11.5px;color:var(--mute-light);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .trow .tsc{font-family:var(--mono);font-size:15px;font-weight:700;text-align:right}
  .trow .tsc span{display:block;font-size:9px;font-weight:400;color:var(--mute-light)}

  .detail{overflow:auto;max-height:calc(100vh - 150px)}
  .dhead{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--hairline);padding:16px 18px;z-index:2}
  .dtags{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:9px}
  .dpkg{font-family:var(--mono);font-size:17px;font-weight:700}
  .dsub{font-family:var(--mono);font-size:11.5px;color:var(--mute-light);margin-top:5px;display:flex;flex-wrap:wrap;gap:3px 14px}
  .dbody{padding:16px 18px}
  .blk{border:1px solid var(--hairline);border-radius:var(--r-md);padding:13px 14px;margin-bottom:13px;background:#fff}
  .blk-h{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--mute-light);margin-bottom:9px}
  .summary{font-size:13.5px;line-height:1.6} .summary b{font-weight:700}
  .summary.gen{filter:blur(3px);opacity:.55;transition:filter .3s ease,opacity .3s ease}
  .genbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.04em;color:#C15F3C;text-transform:none;animation:blink 1.2s ease-in-out infinite}
  @keyframes blink{50%{opacity:.4}}
  /* AI summary — flat card with a thin left rule (the key AI insight) */
  .blk.ai-sum{position:relative;overflow:hidden;padding-left:18px;background:rgba(217,119,87,.05);border-color:rgba(217,119,87,.28)}
  .blk.ai-sum::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#C15F3C}
  .ai-sum-h{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .ai-lbl{font-size:13px;font-weight:700;letter-spacing:-.01em;color:#C15F3C}
  .ai-src{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.02em;color:var(--mute-light)}
  .ai-sum .summary{font-size:15px;line-height:1.65;color:var(--ink-deep)}
  .ai-sum .summary b{font-weight:700;color:#C15F3C}
  .vrow{display:flex;gap:15px;align-items:center}
  .ring{width:72px;height:72px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
  .ring::after{content:"";position:absolute;inset:9px;border-radius:50%;background:#fff}
  .ring .v{position:relative;z-index:2;font-family:var(--mono);font-weight:700;font-size:19px}
  .vm b{display:block;font-size:13.5px;margin-bottom:3px} .vm span{font-family:var(--mono);font-size:11.5px;color:var(--mute-light);line-height:1.6}
  .vd{font-weight:700} .vd.mal{color:var(--warning)} .vd.gated{color:var(--ps-blue)}
  .finding{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--hairline);border-radius:var(--r-md);padding:9px 11px;margin-top:7px}
  .tier{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:var(--r-sm);padding:2px 6px;flex-shrink:0;margin-top:1px}
  .tier.T0{background:var(--ink);color:#fff} .tier.T1{background:#fff;color:var(--ink);border:1px solid var(--ink)} .tier.T2{background:#fff;color:var(--ps-blue);border:1px solid var(--ps-blue)}
  .finding .fd{font-size:12.5px;color:var(--body-light)} .finding .fd b{font-family:var(--mono);font-size:11px;color:var(--ink);display:block;margin-bottom:2px}
  .stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .stat{border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 6px;text-align:center}
  .stat b{display:block;font-family:var(--mono);font-size:17px;font-weight:700} .stat span{font-size:10px;color:var(--mute-light)}
  .tl{position:relative;padding-left:22px} .tl::before{content:"";position:absolute;left:5px;top:5px;bottom:5px;width:1px;background:var(--ash-light)}
  .tl-i{position:relative;padding-bottom:12px} .tl-i:last-child{padding-bottom:0}
  .tl-i::before{content:"";position:absolute;left:-21px;top:3px;width:9px;height:9px;border-radius:50%;background:#fff;border:1.5px solid var(--ash-light)}
  .tl-i.hot::before{background:var(--warning);border-color:var(--warning)}
  .tl-t{font-family:var(--mono);font-size:10.5px;color:var(--mute-light)} .tl-e{font-size:12.5px;margin-top:2px} .tl-i.hot .tl-e{color:var(--warning);font-weight:600}
  .tl-e .mono{font-family:var(--mono);font-size:11.5px;background:var(--surface-soft);padding:0 4px;border-radius:3px}
  .graph svg{display:block;width:100%;height:auto} .gn{font-family:var(--mono);font-size:10px} .ge{font-family:var(--mono);font-size:8.5px;fill:var(--mute-light)}
  .glegend{display:flex;flex-wrap:wrap;gap:13px;font-family:var(--mono);font-size:10.5px;color:var(--mute-light);margin-top:9px}
  .glegend i{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:5px}
  .dactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .dempty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--mute-light);font-size:13px;text-align:center;padding:40px}

  /* ===== tables / config ===== */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--hairline);margin-bottom:18px}
  .tab{padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--mute-light);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--ink);border-bottom-color:var(--ps-blue)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute-light);font-weight:700;padding:0 12px 10px;border-bottom:1px solid var(--hairline)}
  td{padding:12px;border-bottom:1px solid var(--hairline);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .t-pkg,.t-hook{font-family:var(--mono);font-size:13px}
  .muted{color:var(--mute-light)} .mono-sm{font-family:var(--mono);font-size:12px}

  /* toggle switch */
  .switch{position:relative;display:inline-flex;align-items:center;width:42px;height:24px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0;position:absolute}
  .switch .sl{position:absolute;inset:0;background:var(--ash-light);border-radius:var(--r-full);transition:.18s}
  .switch .sl::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s}
  .switch input:checked + .sl{background:var(--ps-blue)} .switch input:checked + .sl::before{transform:translateX(18px)}
  .row-toggle{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--hairline)}
  .row-toggle:last-child{border-bottom:none}
  .row-toggle .rt-l{flex:1} .row-toggle .rt-l b{display:block;font-size:14px} .row-toggle .rt-l span{font-size:12.5px;color:var(--mute-light)}

  /* select / inputs */
  .sel,.inp{font-size:13px;padding:7px 10px;border:1px solid var(--ash-light);border-radius:var(--r-sm);background:#fff;outline:none}
  .inp.bad{border-color:var(--warning);background:var(--warning-bg)}
  .sel:focus,.inp:focus{border-color:var(--ps-blue)}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:12.5px;color:var(--mute-light);font-weight:600}
  .field .inp{width:100%}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}

  /* yaml preview */
  .yaml{background:var(--ink-deep);color:#e6e8ec;border-radius:var(--r-md);padding:14px 16px;font-family:var(--code);font-size:12px;line-height:1.65;overflow-x:auto;white-space:pre}
  .yaml .k{color:#79b8ff} .yaml .s{color:#9ecbff} .yaml .c{color:#6b7480}

  /* allowlist chips */
  .cidrset{margin-bottom:16px}
  .cidrset h4{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:4px}
  .cidrset .desc{font-size:12.5px;color:var(--mute-light);margin-bottom:10px}
  .cidrs{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .cidr{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;background:var(--surface-card);border:1px solid var(--hairline);border-radius:var(--r-full);padding:5px 7px 5px 12px}
  .cidr button{border:none;background:none;color:var(--mute-light);font-size:15px;line-height:1;padding:0 2px}
  .cidr button:hover{color:var(--warning)}
  .cidr-add{display:inline-flex;gap:6px}
  .cidr-add .inp{font-family:var(--mono);width:160px}

  /* range */
  .range-row{display:flex;align-items:center;gap:16px}
  input[type=range]{flex:1;accent-color:var(--ps-blue)}
  .range-val{font-family:var(--mono);font-size:22px;font-weight:300;width:48px;text-align:right}

  /* toast */
  .toast{position:fixed;bottom:22px;left:calc(50% + var(--sb)/2);transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;font-size:13px;padding:11px 18px;border-radius:var(--r-md);opacity:0;pointer-events:none;transition:.2s;z-index:200;max-width:80vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .mono{color:#79b8ff}

  /* ===== policy update ===== */
  .pu-help{margin:-4px 0 16px}
  .pu-help summary{display:inline-flex;align-items:center;gap:5px;cursor:pointer;color:var(--ps-blue);font-size:12.5px;font-weight:600;list-style:none;width:fit-content}
  .pu-help summary::-webkit-details-marker{display:none}
  .pu-help summary::before{content:"ⓘ";font-weight:400}
  .pu-help[open] summary{margin-bottom:8px}
  .pu-help p{color:var(--body-light);font-size:12.5px;line-height:1.6;max-width:620px}
  .pu-2col{display:grid;grid-template-columns:1.25fr .95fr;gap:16px;align-items:start}
  .pu-yaml-wrap{position:sticky;top:78px}
  .pu-rule{border:1px solid var(--hairline);border-radius:var(--r-md);margin-bottom:12px;overflow:hidden}
  .pu-rule-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:11px 13px;background:var(--surface-card);border-bottom:1px solid var(--hairline)}
  .pu-rule-h .sel{min-width:148px}
  .pu-rule-h .ix{font-family:var(--mono);font-size:11px;color:var(--mute-light);font-weight:700}
  .pu-rule-h .sp{margin-left:auto}
  .pu-foll{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--body-light)}
  .pu-rm{border:none;background:none;color:var(--mute-light);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .pu-rm:hover{color:var(--warning)}
  .pu-sel-body{padding:13px 14px;display:flex;flex-direction:column;gap:13px}
  .pu-sel-row{display:flex;flex-direction:column;gap:6px}
  .pu-sel-row .lab{display:flex;align-items:center;gap:8px;font-size:12.5px}
  .pu-sel-row .lab b{font-family:var(--mono);font-size:12px}
  .pu-sel-row .lab .g{color:var(--mute-light);font-size:11.5px}
  .pu-sel-row .lab .x{margin-left:auto;border:none;background:none;color:var(--mute-light);font-size:13px;cursor:pointer;line-height:1}
  .pu-sel-row .lab .x:hover{color:var(--warning)}
  .pu-addsel{margin-top:2px}
  .pu-addsel .sel{font-size:12.5px;color:var(--mute-light)}
  .pu-none{font-size:12.5px;color:var(--mute-light);font-style:italic}
  .pu-banner{border-radius:var(--r-md);padding:11px 14px;font-size:12.5px;margin-bottom:12px;line-height:1.55}
  .pu-banner.ok{background:rgba(31,143,78,.08);color:var(--ok);border:1px solid rgba(31,143,78,.3)}
  .pu-banner.warn{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(200,27,58,.3)}
  .btn[disabled]{opacity:.45;pointer-events:none}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;animation:mfade .15s forwards;padding:20px}
  @keyframes mfade{to{opacity:1}}
  .modal-card{background:#fff;border-radius:var(--r-lg);max-width:430px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-card .mc-h{font-size:15px;font-weight:700;padding:18px 20px 0}
  .modal-card .mc-b{font-size:13px;color:var(--body-light);line-height:1.6;padding:10px 20px 18px}
  .modal-card .mc-f{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 18px}
  .modal-card .mc-warn{margin:0 20px 16px;background:#fff8e6;border:1px solid #f0c869;color:#7a5600;border-radius:var(--r-md);padding:10px 13px;font-size:12.5px;line-height:1.55}
  .modal-card .mc-warn b{color:#7a5600}
  .modal-card .mc-warn ul{margin:6px 0 0;padding-left:17px}
  .modal-card .mc-warn li{margin:2px 0}

  /* mobile */
  .menu-btn{display:none}
  @media(max-width:1080px){ .threats{grid-template-columns:1fr} .tcol{max-height:none} .detail{max-height:none} .ov-2col{grid-template-columns:1fr} .pu-2col{grid-template-columns:1fr} .pu-yaml-wrap{position:static} .kpis{grid-template-columns:repeat(2,1fr)} .kpi:nth-child(odd){border-left:none} .form-grid{grid-template-columns:1fr} }
  @media(max-width:760px){
    :root{--sb:0px}
    .sidebar{transform:translateX(-100%);transition:transform .2s;width:248px} .sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.4)}
    .main{margin-left:0} .menu-btn{display:inline-flex} .kpis{grid-template-columns:1fr} .kpi{border-left:none;border-top:1px solid var(--hairline)} .kpi:first-child{border-top:none} .content{padding:18px}
    .toast{left:50%}
  }
</style>
</head>

function applyStatic(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('.langtoggle button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
}

let currentView='overview';
function navigate(view,arg){
  currentView=view;
  try{location.hash=view+(arg?('/'+encodeURIComponent(arg)):'');}catch(e){}
  document.querySelectorAll('[data-view-panel]').forEach(p=>p.hidden=(p.dataset.viewPanel!==view));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('on',n.dataset.nav===view));
  document.getElementById('view-title').textContent=t('title.'+view);
  document.getElementById('sidebar').classList.remove('open');
  const main=document.querySelector('.main'); if(main)main.scrollTop=0;
  if(view==='overview')renderOverview();
  else if(view==='threats'){renderThreats(); selectAlert(arg||(visible()[0]&&visible()[0]._k));}
  else if(view==='policies')renderPolicies();
  else if(view==='policyupdate')renderPolicyUpdate();
  else if(view==='settings')renderSettings();
  updateTopMetric();
}
function routeFromHash(){
  const h=(location.hash||'#overview').slice(1).split('/');
  const v=['overview','threats','policies','policyupdate','settings'].includes(h[0])?h[0]:'overview';
  navigate(v, h[1]?decodeURIComponent(h[1]):undefined);
}
document.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>navigate(n.dataset.nav));

function kpi(target,labelKey,val,sub){
  return '<button class="kpi click" data-target="'+target+'">'+
    '<span class="kl">'+t(labelKey)+'</span>'+
    '<span class="kv">'+val+'</span>'+
    '<span class="ksub">'+sub+'</span>'+
    '<span class="kpi-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>';
}
function legRow(c,name,v,m){return '<div class="legend-row"><i style="background:'+c+'"></i><span class="ln">'+name+'</span><span class="lv">'+v+'</span><span class="lm">'+m+'</span></div>';}
function hrow(l,v,pct){return '<div class="hrow"><span class="hl">'+l+'</span>'+(pct!==null?'<span class="bar"><i style="width:'+pct+'%"></i></span>':'')+'<span class="hv">'+v+'</span></div>';}
/* status row: label + value. tone colors the value — 'ok' green, 'bad' red, else plain.
   No colored bullet marker; the value text itself carries the status color. */
function srow(l,v,tone){var c=tone==='ok'?'var(--ok)':tone==='bad'?'var(--warning)':'';return '<div class="hrow"><span class="hl">'+l+'</span><span class="hv"'+(c?' style="color:'+c+';font-weight:700"':'')+'>'+v+'</span></div>';}
/* the four sensor-health rows (connection / detection engine / lost events / kernel) */
function healthRows(){
  var rows='';
  // sensor connection — from HCONN (null = no backend -> demo shows connected)
  if(HCONN&&!HCONN.connected){
    rows+=srow(t('h.conn'),t('st.disconnected'),'bad');
  }else{
    var age=(HCONN?t('st.connected')+' · '+HCONN.age+t('st.ago'):t('st.connected'));
    rows+=srow(t('h.conn'),age,'ok');
  }
  // detection engine — healthy (green) unless a base object was skipped (red)
  rows+=srow(t('h.engine'),(STATS.degraded?t('st.degraded'):t('st.healthy'))+' ('+STATS.objects+')',STATS.degraded?'bad':'ok');
  // lost events — 0 is healthy (plain), any loss is a warning (red)
  var d=STATS.drops||0, dv=(lang==='ko'?d+'건':String(d));
  rows+=srow(t('h.drops'),dv,d>0?'bad':null);
  // kernel version — plain info line
  rows+=hrow(t('h.kernel'),STATS.kernel,null);
  return rows;
}

// renderReportSummary fills the summary block with a report's narrative + rationale +
// severity/source line. All text via textContent (XSS-safe: it carries model output and
// attacker-controlled package data).
// GNN_FLAG_TEXT localizes the GNN's anomaly-detector flags (keys from score.py). Unknown keys
// fall back to the raw key, mirroring the Go gnnFlagLabel helper.
const GNN_FLAG_TEXT={
  structural:{ko:'그래프 구조가 정상 프로파일 범위 밖',en:'graph structure outside the benign profile'},
  unknown_syscall:{ko:'정상 설치에 없던 시스템콜 사용',en:'used syscalls not seen in benign installs'},
  verb_distribution:{ko:'시스템콜 분포가 정상 대비 크게 다름',en:'syscall mix deviates from the benign baseline'},
};
function gnnFlagLabel(f){const e=GNN_FLAG_TEXT[f]; return e?(e[lang]||e.en):f;}
function renderReportSummary(el,rep,fallback){
  el.textContent='';
  const p=document.createElement('div'); p.textContent=rep.summary||fallback||''; el.appendChild(p);
  if(Array.isArray(rep.gnn_flags)&&rep.gnn_flags.length){
    const g=document.createElement('div'); g.style.cssText='margin:6px 0 0';
    const gh=document.createElement('div'); gh.className='muted mono-sm'; gh.textContent=t('d.gnnbasis'); g.appendChild(gh);
    const gl=document.createElement('ul'); gl.style.cssText='margin:2px 0 0;padding-left:18px';
    rep.gnn_flags.forEach(f=>{const li=document.createElement('li'); li.textContent=gnnFlagLabel(f); gl.appendChild(li);});
    g.appendChild(gl); el.appendChild(g);
  }
  if(Array.isArray(rep.rationale)&&rep.rationale.length){
    const ul=document.createElement('ul'); ul.style.cssText='margin:6px 0 0;padding-left:18px';
    rep.rationale.forEach(r=>{const li=document.createElement('li'); li.textContent=r; ul.appendChild(li);});
    el.appendChild(ul);
  }
  // source (model/templated) moves up to the header badge to reinforce the AI feel
  const src=rep.source==='model'?t('d.reportsrc.model'):t('d.reportsrc.templated');
  const srcEl=document.getElementById('d-sum-src'); if(srcEl){srcEl.textContent=src;srcEl.hidden=false;}
  const meta=document.createElement('div'); meta.className='muted mono-sm'; meta.style.marginTop='6px';
  const vtxt=rep.verdict?(' · '+(lang==='ko'?'판정 ':'verdict ')+rep.verdict+(rep.gnn_score>0?' '+rep.gnn_score.toFixed(2):'')):'';
  meta.textContent=(lang==='ko'?'심각도 ':'severity ')+(rep.severity||'-')+vtxt;

// Per-incident report cache + in-flight dedup, keyed by id+lang+mode so the 한국어/English toggle
// and an AI-enable change never serve a stale-language or stale-mode summary. Cleared on LLM save.
const _repCache={}, _repInflight={}; let _repGen=0;
function reportCacheKey(id){return id+'|'+lang+'|'+(LLM.enabled?'m':'t');}
function clearReportCache(){_repGen++;for(const k in _repCache)delete _repCache[k];for(const k in _repInflight)delete _repInflight[k];}
// autoSummary fills the summary block for an incident: instant from cache, else it shows a blurred
// "생성 중" placeholder and fetches the report — POST with the saved LLM config when AI narration is
// enabled (model), otherwise GET (templated/server). It de-dupes concurrent fetches per key, drops a
// late response for a moved-on selection or a detached node, and reveals the finished summary by
// un-blurring. All report text renders via textContent (XSS-safe).
function autoSummary(id,el){
  if(!el||!id)return;
  const fallback=el.textContent;
  const key=reportCacheKey(id), gen=_repGen;
  if(_repCache[key]){renderReportSummary(el,_repCache[key],fallback);return;}
  const badge=document.getElementById('d-sum-badge');
  el.classList.add('gen');
  if(badge){badge.textContent=t('d.generating');badge.hidden=false;}
  const done=()=>{el.classList.remove('gen');if(badge)badge.hidden=true;};
  const stale=()=>!curK||!byId[curK]||byId[curK].report_id!==id||document.getElementById('d-summary')!==el;
  const req=_repInflight[key]||(_repInflight[key]=(LLM.enabled?postReport(id):jget('/api/report?id='+encodeURIComponent(id)+'&lang='+lang)));
  req.then(rep=>{
    if(_repInflight[key]===req)delete _repInflight[key];
    if(gen===_repGen&&rep&&rep.incident_id)_repCache[key]=rep; // don't cache a result from before an LLM-settings change
    if(stale())return;
    if(!rep||!rep.incident_id){done();el.textContent=fallback;return;}
    renderReportSummary(el,rep,fallback);
    requestAnimationFrame(done);
  }).catch(()=>{if(_repInflight[key]===req)delete _repInflight[key];if(stale())return;done();el.textContent=fallback;toast('reporterr');});
}

function graphSVG(g){
  const procs=g.nodes.filter(n=>n.type==='process'||n.type==='shell'),tgts=g.nodes.filter(n=>n.type==='file'||n.type==='socket'),pos={};
  procs.forEach((n,i)=>pos[n.id]={x:72,y:36+i*54,w:72,h:26}); tgts.forEach((n,i)=>pos[n.id]={x:330,y:58+i*64,w:170,h:26});
  const H=Math.max(36+procs.length*54,58+tgts.length*64,140)+14; let e='';
  g.edges.forEach(ed=>{const a=pos[ed.from],b=pos[ed.to];if(!a||!b)return;const col=ed.hot?'#c81b3a':'#9aa1ab',mk=ed.hot?'url(#mkh)':'url(#mk)';
    let x1,y1,x2,y2; if(Math.abs(a.x-b.x)<14){x1=a.x;y1=a.y+a.h/2;x2=b.x;y2=b.y-b.h/2;}else{x1=a.x+a.w/2;y1=a.y;x2=b.x-b.w/2;y2=b.y;}
    const mx=(x1+x2)/2,my=(y1+y2)/2; e+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+(ed.hot?2:1.3)+'" marker-end="'+mk+'"/>';
    if(ed.label)e+='<text class="ge" x="'+(mx+5)+'" y="'+(my-3)+'" '+(ed.hot?'fill="#c81b3a"':'')+'>'+ed.label+'</text>';});
  let n=''; g.nodes.forEach(nd=>{const p=pos[nd.id];if(!p)return;let fill='#fff',tc='#000';if(nd.type==='shell')fill='#eceef1';else if(nd.type==='file'||nd.type==='socket'){fill='#000';tc='#fff';}
    n+='<g><rect x="'+(p.x-p.w/2)+'" y="'+(p.y-p.h/2)+'" width="'+p.w+'" height="'+p.h+'" rx="5" fill="'+fill+'" stroke="#000" stroke-width="1.1"/><text class="gn" x="'+p.x+'" y="'+(p.y+4)+'" text-anchor="middle" fill="'+tc+'">'+nd.label+'</text></g>';});
  return '<svg viewBox="0 0 480 '+H+'" xmlns="http://www.w3.org/2000/svg"><defs><marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#9aa1ab" stroke-width="1.4"/></marker><marker id="mkh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#c81b3a" stroke-width="1.4"/></marker></defs>'+e+n+'</svg>';
}

// isCidr mirrors the loader's net.ParseCIDR check so the form catches a malformed
// CIDR (the one silent-drop reachable via the form) before apply, instead of the
// loader dropping the rule behind a green "applied".
function isCidr(s){
  s=String(s).trim();
  const m=s.match(/^([^/]+)\/(\d{1,3})$/); if(!m)return false;
  const ip=m[1], bits=+m[2];
  if(ip.indexOf(':')>=0){ // IPv6 (loose): reject obvious junk, accept valid forms
    if(bits>128)return false;
    return /^[0-9a-fA-F:]+$/.test(ip) && (ip.match(/::/g)||[]).length<=1 && ip.split(':').length<=8;
  }
  const o=ip.split('.'); if(o.length!==4||bits>32)return false;
  return o.every(x=>/^\d{1,3}$/.test(x) && +x<=255);
}
// puFieldError mirrors the backend's policy validation (ruleset/policyfile IsPolicyName +
// net.ParseCIDR + the selector kinds) so a typo is caught in the form with a SPECIFIC
// message before the save round-trips. Returns '' when the value is valid (or the kind is
// not checked). kind is a selector key (cidr/dport/paths/...) or 'follow'/'file'.
function puFieldError(kind,value){
  const v=String(value==null?'':value).trim(); if(v==='')return '';
  const ev=esc(v);
  switch(kind){
    case 'cidr': case 'cidr_not':
      return isCidr(v)?'':t('pu.err.cidr').replace('{v}',ev);
    case 'dport': case 'dport_ge': case 'dport_le':{
      const n=Number(v),lo=(kind==='dport')?1:0;
      return (Number.isInteger(n)&&n>=lo&&n<=65535)?'':t('pu.err.port').replace('{v}',ev);}
    case 'uid': case 'euid': case 'gid':{
      const n=Number(v);
      return (Number.isInteger(n)&&n>=0)?'':t('pu.err.uid').replace('{v}',ev);}
    case 'paths': case 'path_prefix':
      return v.startsWith('/')?'':t('pu.err.path').replace('{v}',ev);
    case 'follow':
      return v.startsWith('/')?'':t('pu.err.follow').replace('{v}',ev);
    case 'file':{
      const bad=v.includes('/')||v.includes('\\')||v.startsWith('.')||!/\.(ya?ml)$/.test(v);
      return bad?t('pu.err.file').replace('{v}',ev):'';}

  }
}
function puValidate(){
  if(PU.mode==='raw'){
    // Raw AI-generated YAML: the structured per-field checks can't cover a generic-section
    // policy, so validation is minimal here (valid filename + non-empty + a *top-level* enabled:)
    // and the backend preflight is the source of truth. hasEnforce is a broad scan (quoted/
    // flow-style tolerant) so the DENY/KILL confirm still fires; over-matching only errs toward
    // showing the confirm.
    const y=PU.rawYaml||'',warns=[];
    const fe=puFieldError('file',PU.file); if(fe)warns.push(fe);
    if(!/\S/.test(y)||!/^enabled\s*:/m.test(y))warns.push(t('pu.raw.invalid'));
    const hasEnforce=/(^|[\s{,])action\s*:\s*["']?(deny|kill)\b/i.test(y);
    return {ok:warns.length===0,warns,hasEnforce};
  }
  if(!PU.rules.length)return {ok:false,warns:[t('pu.warn.norules')],hasEnforce:false};
  let warns=[],hasEnforce=false;
  const fe=puFieldError('file',PU.file); if(fe)warns.push(fe);
  PU.follow_binaries.forEach(b=>{const e=puFieldError('follow',b); if(e)warns.push(e);});
  PU.rules.forEach(r=>{
    const enforce=(r.action==='deny'||r.action==='kill'); if(enforce)hasEnforce=true;
    const nSel=Object.keys(r.sel).filter(k=>puFilled(r.sel[k],k)).length;
    if(enforce&&nSel===0&&!r.follow)warns.push(t('pu.warn.brick'));
    if(enforce&&('cidr_not'in r.sel)&&!(r.sel.cidr_not&&r.sel.cidr_not.length))warns.push(t('pu.warn.cidrempty'));
    Object.keys(r.sel).forEach(k=>{const v=r.sel[k];
      if(Array.isArray(v)){v.forEach(it=>{if(it){const e=puFieldError(k,it); if(e)warns.push(e);}});}
      else if(v!==''&&v!=null){const e=puFieldError(k,v); if(e)warns.push(e);}
    });
  });
  warns=[...new Set(warns)];
  return {ok:warns.length===0,warns,hasEnforce};
}

// preserved) and re-applies it, so the kernel reloads observe-only or enforce.
// ON = monitor:true = 차단 없이 관찰(DENY→LOG, 모두 GNN으로).
async function applyMonitorMode(on){
  const token=(sessionStorage.getItem('hechi_policy_token')||'').trim()||'hechi-demo';
  try{
    const g=await jget('/api/policy?file='+encodeURIComponent(PU.file));
    let y=(g&&g.yaml)||'';
    if(!y)throw new Error('empty policy');
    if(/^[ \t]*monitor[ \t]*:/m.test(y)) y=y.replace(/^([ \t]*)monitor[ \t]*:.*$/m,'$1monitor: '+(on?'true':'false'));
    else if(/^[ \t]*enabled[ \t]*:.*$/m.test(y)) y=y.replace(/^([ \t]*enabled[ \t]*:.*)$/m,'$1\nmonitor: '+(on?'true':'false'));
    else y='monitor: '+(on?'true':'false')+'\n'+y;
    const r=await fetch(API_BASE+'/api/policy',{method:'POST',headers:{'Content-Type':'application/json','X-Hechi-Policy-Token':token},cache:'no-store',body:JSON.stringify({file:PU.file,yaml:y})});
    if(!r.ok)throw new Error(await r.text());
    toast(on?'monon':'monoff');
  }catch(e){ toast('reporterr'); }
}
// puLintYaml does a lightweight structural lint of hand-edited policy YAML so obvious
// mistakes are rejected (with a line number) before we ever POST. It is NOT a full YAML
// parser — the backend preflight remains the source of truth — but it catches the common
// hand-edit errors: tabs, missing space after ':', non key/list lines, no top-level enabled:.
function puLintYaml(y){
  const lines=(y||'').split(/\r?\n/);
  for(let i=0;i<lines.length;i++){
    const ln=i+1, body=lines[i].replace(/\s+$/,'').replace(/^\s+/,'');
    if(/\t/.test(lines[i]))return {line:ln,msg:t('pu.lint.tab')};
    if(body===''||body[0]==='#'||body[0]==='-')continue;
    const m=body.match(/^([^:#][^:]*):(.*)$/);
    if(!m)return {line:ln,msg:t('pu.lint.nokey')};
    if(m[2].length&&m[2][0]!==' ')return {line:ln,msg:t('pu.lint.space')};
  }
  if(!/^enabled\s*:/m.test(y||''))return {line:0,msg:t('pu.lint.enabled')};
  return null;
}

  // Raw hand-edited YAML: lint first and reject a malformed policy with its line number.
  if(PU.mode==='raw'){
    const le=puLintYaml(PU.rawYaml);
    if(le){
      const em=t('pu.lint.reject')+' — '+(le.line>0?t('pu.lint.at').replace('{n}',le.line)+' ':'')+le.msg;
      puSetStatus('warn',em); toastHTML(em,4200);
      return;
    }
  }
  // Every apply is kernel-level: confirm with the yellow caution box before writing.
  const caution='<b>'+t('pu.apply.confirm')+'</b><ul><li>'+t('pu.apply.c1')+'</li><li>'+t('pu.apply.c2')+'</li><li>'+t('pu.apply.c3')+'</li></ul>';
  puModal({title:t('pu.apply.title'),bodyHTML:t('pu.apply.body'),warnHTML:caution,danger:true,ok:t('pu.confirm.ok'),onOk:puDoApply});
}
function puSetStatus(cls,msg){
  const el=document.getElementById('pu-status'); if(!el)return;
  el.style.display='block'; el.className='pu-banner '+cls; el.innerHTML=msg;
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function puPollStatus(since){
  for(let i=0;i<12;i++){
    await delay(1000);
    try{
      const st=await jget('/api/policy/status');
      const ts=Number(st.updated_at_unix_nano||0);
      if(ts && ts>=since)return st;
    }catch(e){}
  }
  return null;
}
async function puDoApply(){
  const token=(sessionStorage.getItem('hechi_policy_token')||'').trim()||'hechi-demo';
  const btn=document.getElementById('pu-apply'); if(btn)btn.disabled=true;
  puSetStatus('warn',t('pu.saved'));
  try{
    const r=await fetch(API_BASE+'/api/policy',{method:'POST',headers:{'Content-Type':'application/json','X-Hechi-Policy-Token':token},cache:'no-store',body:JSON.stringify({file:PU.file,yaml:puYamlPlain()})});
    if(!r.ok)throw new Error(await r.text());
    const saved=await r.json();
    toastHTML(t('pu.saved'));
    const st=await puPollStatus(Number(saved.saved_at_unix_nano||0));
    if(!st){
      puSetStatus('warn',t('pu.wait'));
      toastHTML(t('pu.wait'),3600);
    }else if(st.status==='applied'){
      const ws=Array.isArray(st.warnings)?st.warnings:[];
      let h=t('pu.applied')+(st.message?'<br>'+esc(st.message):'');
      if(ws.length){h+='<br><b>'+t('pu.applied.warn').replace('{n}',ws.length)+'</b><ul style="margin:6px 0 0;padding-left:18px">'+ws.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';}
      puSetStatus(ws.length?'warn':'ok',h); // amber when the loader dropped rule(s), green when clean
      toastHTML(t('pu.applied'));
      loadLive().then(changed=>{if(changed){updateTopMetric();}});
    }else{
      const msg=st.message||st.status||t('pu.err');
      puSetStatus('warn',esc(msg));
      toastHTML(esc(msg),5200);
    }
  }catch(e){
    const msg=(e&&e.message)?e.message:t('pu.err');
    puSetStatus('warn',esc(msg));
    toastHTML(esc(msg),5200);
  }finally{
    const v=puValidate(); if(btn)btn.disabled=!v.ok;
  }
}
// puModal is a small confirm dialog: title + optional body + optional yellow caution box
// (warnHTML) + Cancel/OK. Used for the edit-YAML warning and the kernel-apply confirmation.
function puModal(opts){
  const ov=document.createElement('div'); ov.className='modal';
  const body=opts.bodyHTML?'<div class="mc-b">'+opts.bodyHTML+'</div>':'';
  const warn=opts.warnHTML?'<div class="mc-warn">'+opts.warnHTML+'</div>':'';
  const okCls=opts.danger?'btn-danger':'btn-primary';
  ov.innerHTML='<div class="modal-card"><div class="mc-h">'+opts.title+'</div>'+body+warn+'<div class="mc-f"><button class="btn btn-ghost btn-sm" data-x>'+(opts.cancel||t('pu.confirm.cancel'))+'</button><button class="btn '+okCls+' btn-sm" data-ok>'+(opts.ok||t('pu.confirm.ok'))+'</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('[data-x]').onclick=close;
  ov.querySelector('[data-ok]').onclick=()=>{close();opts.onOk&&opts.onOk();};
}
function showGNN(){
  const ov=document.createElement('div'); ov.className='modal';
  const rows=GNNV.length?GNNV.map(v=>{
    const clean=(v.verdict==='whitelist'||v.verdict==='benign');
    const color=clean?'var(--ok)':'var(--warning)';
    const vlabel=v.verdict?t(clean?'gnn.v.normal':'gnn.v.anomalous'):'-';
    const ts=esc(String(v.ts||'').replace('T',' ').slice(0,19));
    const sd=(typeof v.struct_dist==='number')?v.struct_dist.toFixed(1):'-';
    return '<tr><td class="mono">'+esc(v.pkg||'-')+'</td><td><span style="font-weight:700;color:'+color+'">'+vlabel+'</span></td><td class="mono" style="text-align:right">'+sd+'</td><td class="mono muted" style="font-size:11px">'+ts+'</td></tr>';
  }).join(''):'<tr><td colspan="4" class="muted" style="padding:14px">'+(lang==='ko'?'아직 GNN 판정 결과가 없습니다.':'No GNN verdicts yet.')+'</td></tr>';
  ov.innerHTML='<div class="modal-card" style="max-width:1040px;width:94vw"><div class="mc-h">'+t('gnn.modal.title')+' <span class="muted" style="font-weight:400">('+GNNV.length+')</span></div><div class="mc-b" style="padding:10px 22px 18px"><div style="max-height:76vh;overflow:auto"><table style="width:100%;font-size:13.5px"><thead><tr><th>'+t('gnn.col.pkg')+'</th><th>'+t('gnn.col.verdict')+'</th><th style="text-align:right">'+t('gnn.col.score')+'</th><th>'+t('gnn.col.ts')+'</th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div class="mc-f"><button class="btn btn-ghost btn-sm" data-x>'+t('gnn.close')+'</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('[data-x]').onclick=close;
}

/* ============================================================
   toast + icons + boot
   ============================================================ */
const TOASTS={
  esc:{ko:'상위 이관 전송 (데모), L3·IR 큐로',en:'Escalated (demo), to L3/IR queue'},
  fp:{ko:'오탐 신고 → allowlist 후보 (데모)',en:'Reported false-positive → allowlist candidate (demo)'},
  block:{ko:'C2 egress 차단 요청 (데모)',en:'Requested C2 egress block (demo)'},
  savek:{ko:'<span class="mono">policies/campaign-custom.yaml</span> 저장 후 loader status 확인',en:'Save <span class="mono">policies/campaign-custom.yaml</span> and check loader status'},
  saveu:{ko:'<span class="mono">rulebook/userspace_rules.yaml</span> 기록 (데모)',en:'Would write <span class="mono">rulebook/userspace_rules.yaml</span> (demo)'},
  added:{ko:'허용목록에 추가됨 (데모)',en:'Added to allowlist (demo)'},
  llmsaved:{ko:'AI 보고서 설정 저장됨 (이 브라우저)',en:'AI report settings saved (this browser)'},
  reporterr:{ko:'보고서 생성 실패 — 백엔드/LLM 설정을 확인하세요',en:'Report generation failed — check the backend / LLM settings'},
  aigen:{ko:'AI 정책 생성 중…',en:'Generating AI policy…'},
  aiready:{ko:'AI 정책 생성됨 — 검토 후 적용',en:'AI policy generated — review and apply'},
  aineedon:{ko:'설정에서 AI를 먼저 활성화하세요',en:'Enable AI in Settings first'},
  monon:{ko:'관찰 모드 적용됨 — 차단 없이 모두 관찰(GNN)',en:'Monitor mode applied — observe only, no blocking'},
  monoff:{ko:'차단 모드 복귀 — enforce',en:'Enforce mode restored'}};
function toast(key){const el=document.getElementById('toast');el.innerHTML=lv(TOASTS[key]||{ko:key,en:key});el.classList.add('show');clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),2200);}
function toastHTML(html,ms){const el=document.getElementById('toast');el.innerHTML=html;el.classList.add('show');clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),ms||2600);}

/* lang toggle */
function setLang(l){lang=l;try{localStorage.setItem('hechi-lang',l);}catch(e){}applyStatic();navigate(currentView, currentView==='threats'?curK:undefined);}
document.querySelectorAll('.langtoggle button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

/* ============================================================
   live data: fetch real engine output from the hechi-web API.
   API base: ?api=<url> query, or window.HECHI_API, else same-origin.
   Any failure (offline / file:// / no backend) keeps the seed data above,
   so the page still works standalone.
   ============================================================ */
const API_BASE=(function(){
  try{const q=new URLSearchParams(location.search).get('api'); if(q)return q.replace(/\/+$/,'');}catch(e){}
  return (window.HECHI_API||'').replace(/\/+$/,'');
})();
let LIVE=false;
async function jget(p){const r=await fetch(API_BASE+p,{cache:'no-store'}); if(!r.ok)throw new Error(p+' '+r.status); return r.json();}

/* ── AI report (LLM) settings ─────────────────────────────────────────────────
   Non-secret settings persist in localStorage; the API key lives only in
   sessionStorage (cleared when the tab closes). The key is sent to the backend
   only in a POST body — never a URL/query — so it stays out of logs and history. */
const LLM={enabled:false,provider:'openai',base_url:'',model:'',api_key:'',timeout_ms:60000};
(function(){
  try{const s=JSON.parse(localStorage.getItem('hechi-llm')||'{}');if(s&&typeof s==='object')Object.assign(LLM,s);}catch(e){}
  try{LLM.api_key=sessionStorage.getItem('hechi-llm-key')||'';}catch(e){}
})();
function saveLLM(){
  try{localStorage.setItem('hechi-llm',JSON.stringify({enabled:LLM.enabled,provider:LLM.provider,base_url:LLM.base_url,model:LLM.model,timeout_ms:LLM.timeout_ms}));}catch(e){}
  try{if(LLM.api_key)sessionStorage.setItem('hechi-llm-key',LLM.api_key);else sessionStorage.removeItem('hechi-llm-key');}catch(e){}
}
function llmPayload(){return LLM.enabled?{enabled:true,provider:LLM.provider,base_url:(LLM.base_url||'').trim(),model:(LLM.model||'').trim(),api_key:LLM.api_key||'',timeout_ms:LLM.timeout_ms||60000}:{enabled:false};}
async function postReport(id){
  const r=await fetch(API_BASE+'/api/report',{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify({id:id,lang:lang,llm:llmPayload()})});
  if(!r.ok)throw new Error('report '+r.status);
  return r.json();
}
// aiSummaryHTML renders the backend's appended-rules + warnings lists as escaped HTML for
// the suggest toast, so the operator sees what was merged and what was omitted/flagged.
function aiSummaryHTML(data){
  let h='';
  if(data&&Array.isArray(data.appended)&&data.appended.length)
    h+='<br>'+data.appended.map(x=>'• '+esc(x)).join('<br>');
  if(data&&Array.isArray(data.warnings)&&data.warnings.length)
    h+='<br>⚠ '+data.warnings.map(x=>esc(x)).join('<br>⚠ ');
  return h;
}
// aiSuggestPolicy asks the backend to generate a kernel policy for this threat via the
// operator's opt-in LLM, then drops the YAML into the Policy Update page (raw mode) for review
// and apply. Requires AI enabled + the policy token (same token the apply step needs). A 422
// still loads the YAML so the operator can fix what the model produced.
async function aiSuggestPolicy(id){
  if(!LLM.enabled){toast('aineedon');return;}
  const token=(sessionStorage.getItem('hechi_policy_token')||'').trim()||'hechi-demo';
  const btn=document.getElementById('d-ai-policy-btn'); if(btn)btn.disabled=true;
  toast('aigen');
  try{
    const r=await fetch(API_BASE+'/api/policy/suggest',{method:'POST',headers:{'Content-Type':'application/json','X-Hechi-Policy-Token':token},cache:'no-store',body:JSON.stringify({id:id,lang:lang,llm:llmPayload()})});
    const data=await r.json().catch(()=>({}));
    if(r.status===409){toast('aineedon');return;}
    if(r.status===422){
      PU.mode='raw';PU.rawFromAI=true;PU.rawOk=false;PU.rawYaml=data.yaml||'';PU.file=data.file||PU.file;
      navigate('policyupdate');
      toastHTML(t('pu.raw.failed')+(data.error?'<br>'+esc(data.error):'')+aiSummaryHTML(data),6000);
      return;
    }
    if(!r.ok)throw new Error((data&&data.error)||('suggest '+r.status));
    PU.mode='raw';PU.rawFromAI=true;PU.rawOk=true;PU.rawYaml=data.yaml||'';PU.file=data.file||PU.file;
    navigate('policyupdate');
    const sum=aiSummaryHTML(data);
    if(sum)toastHTML(lv(TOASTS.aiready)+sum,4600);else toast('aiready');
  }catch(e){toast('reporterr');}
  finally{const b=document.getElementById('d-ai-policy-btn'); if(b)b.disabled=false;}
}
function reportSlug(id){return String(id||'report').replace(/[^A-Za-z0-9._-]+/g,'-').replace(/^-+|-+$/g,'')||'report';}
function triggerDownload(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
async function downloadReportPDF(id){
  try{
    const r=await fetch(API_BASE+'/api/report.pdf',{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify({id:id,lang:lang,llm:llmPayload()})});
    if(!r.ok)throw new Error('pdf '+r.status);
    triggerDownload(await r.blob(),reportSlug(id)+'.pdf');
  }catch(e){toast('reporterr');}
}
async function downloadReportJSON(id){
  try{const rep=await postReport(id);triggerDownload(new Blob([JSON.stringify(rep,null,2)],{type:'application/json'}),reportSlug(id)+'.json');}
  catch(e){toast('reporterr');}
}
async function loadLive(){
  const res=await Promise.allSettled([jget('/api/threats'),jget('/api/overview'),jget('/api/rules'),jget('/api/allowlist'),jget('/api/config'),jget('/api/policies'),jget('/api/health'),jget('/api/policy/rules'),jget('/api/gnn')]);
  const [thr,ov,ru,al,cf,pol,he,kr,gv]=res; let changed=false;
  if(gv.status==='fulfilled'&&gv.value&&Array.isArray(gv.value.verdicts)){GNNV=gv.value.verdicts;changed=true;}
  if(kr.status==='fulfilled'&&kr.value&&Array.isArray(kr.value.deny)){KPOL={file:kr.value.file||'npm-unified.yaml',monitor:!!kr.value.monitor,deny:kr.value.deny,observe:kr.value.observe||[],generic:kr.value.generic||[]};changed=true;}
  if(thr.status==='fulfilled'&&Array.isArray(thr.value.threats)){ALERTS=thr.value.threats;rebuildById();LIVE=true;changed=true;}
  if(ov.status==='fulfilled'&&ov.value&&typeof ov.value.gnn_input==='number'){OV={blocked:ov.value.blocked||0,userspace:ov.value.userspace||0,gnn_input:ov.value.gnn_input||0};changed=true;}
  if(ru.status==='fulfilled'&&Array.isArray(ru.value.rules)&&ru.value.rules.length){USER_RULES=ru.value.rules;changed=true;}
  if(al.status==='fulfilled'&&al.value.allowlists&&Object.keys(al.value.allowlists).length){ALLOWLISTS=al.value.allowlists;changed=true;}
  if(cf.status==='fulfilled'&&cf.value.config&&Object.keys(cf.value.config).length){SETTINGS=cf.value.config;changed=true;}
  if(he.status==='fulfilled'&&he.value){
    const v=he.value;
    if(typeof v.objects==='string'){
      STATS.objects=v.objects;
      STATS.drops=v.drops||0;
      if(v.kernel)STATS.kernel=v.kernel;
      STATS.degraded=!!v.degraded;
    }
    HCONN={connected:v.connected!==false,age:v.age_seconds||0};
    changed=true;
  }
  if(pol.status==='fulfilled'&&Array.isArray(pol.value.policies)){
    KERNEL_POLICY.monitor=!!pol.value.effective_monitor;
    KERNEL_POLICY.rules=pol.value.policies.map(p=>({hook:p.file,sel:{ko:(p.rule_count||0)+'개 rule',en:(p.rule_count||0)+' rule(s)'},action:p.monitor?'LOG':'DENY',on:!!p.enabled}));
    if(pol.value.policies[0])KERNEL_POLICY.name=pol.value.policies[0].file;
    changed=true;
  }
  return changed;
}

/* boot: render seed data immediately, then swap to live engine data if reachable. */
applyStatic();
routeFromHash();
updateTopMetric();
loadLive().then(changed=>{ if(changed){ rebuildById(); routeFromHash(); updateTopMetric(); } }).catch(()=>{});
</script>
